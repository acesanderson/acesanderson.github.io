title: Aces Anderson
description: AI Engineering, LLMs, and Software Architecture.
url: "https://acesanderson.dev"

# Theme Configuration
remote_theme: "pages-themes/minimal@v0.2.0"

plugins:
  - jekyll-remote-theme

# Exclude raw files from the built HTML
exclude:
  - .github/
  - Gemfile
  - Gemfile.lock
  - README.md
  - pyproject.toml
  - uv.lock
  - src/
  - tests/
  - vendor/
  - context/
  - tasks/
  - PROJECT.md
  - scratchpad.md
  - manifest.md

# Permalinks
permalink: /:year/:month/:day/:title/

# Markdown parser
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
